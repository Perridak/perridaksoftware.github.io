<html lang="en">
<head>

        * {
            margin: 0;
            padding: 0;

        }
        
        body {

            background: transparent;
            padding: 2rem;
        }
        
        .quiz-container {

            margin: 0 auto;
        }
        
        .quiz-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .quiz-header h1 {
            color: #1B5A56;
            font-size: 2.5rem;
            border-bottom: 3px solid #7BA857;
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .quiz-header p {
            color: #5A7A72;
            font-size: 1.1rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #E8F0E6;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #7BA857;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            text-align: center;
            font-size: 0.9rem;
            color: #5A7A72;
            margin-bottom: 1rem;
        }
        
        .quiz-question {
            margin-bottom: 2rem;
        }
        
        .question-text {
            font-weight: 600;
            color: #1B5A56;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .option {
            padding: 1rem;
            border: 2px solid #D4DED7;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        
        .option:hover {
            border-color: #7BA857;
            background: #F9F7F3;
        }
        
        .option input[type="radio"] {
            margin-right: 0.75rem;
            cursor: pointer;
        }
        
        .option.selected {
            background: #E8F0E6;
            border-color: #7BA857;
        }
        
        .option.correct {
            background: #D4E5D0;
            border-color: #7BA857;
        }
        
        .option.incorrect {
            background: #F5D5D5;
            border-color: #D66767;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        button {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-next {
            background-color: #7BA857;
            color: white;
        }
        
        .btn-next:hover:not(:disabled) {
            background-color: #6B9647;
        }
        
        .btn-next:disabled {
            background-color: #B0C8A8;
            cursor: not-allowed;
        }
        
        #quizContent {
            display: block;
        }
        
        #resultsContent {
            display: none;
        }
        
        #resultsContent.show {
            display: block;
        }
        
        .results {
            text-align: center;
        }
        
        .results h2 {
            color: #1B5A56;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        .score {
            font-size: 3rem;
            color: #7BA857;
            font-weight: bold;
            margin: 1rem 0;
        }
        
        .score-details {
            color: #5A7A72;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        .btn-restart {
            background-color: #1B5A56;
            color: white;
            margin-top: 1.5rem;
        }
        
        .btn-restart:hover {
            background-color: #154A47;
        }
    </style>
</head>

        <div class="button-group">

        </div>
    </div>
    
    <div id="resultsContent" class="results">

    const questionsPerSession = 15;
    
    function getRandomQuestions() {
        const shuffled = [...questionPool].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, questionsPerSession);
    }
    
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    
    function init() {
        currentQuestions = getRandomQuestions();
        currentIndex = 0;
        score = 0;
        document.getElementById('quizContent').style.display = 'block';
        document.getElementById('resultsContent').classList.remove('show');
        showQuestion();
    }
    
    function showQuestion() {
        const question = currentQuestions[currentIndex];
        const container = document.getElementById('questionContainer');
        
        let html = `<div class="question-text">${currentIndex + 1}. ${question.question}</div>`;
        html += '<div class="options">';
        
        question.options.forEach((option, idx) => {
            const id = `option${idx}`;
            html += `
                <label class="option" onclick="selectOption(this, ${idx})">
                    <input type="radio" id="${id}" name="answer" value="${idx}" />
                    ${option}
                </label>
            `;
        });
        
        html += '</div>';
        container.innerHTML = html;
        
        updateProgress();
    }
    
    function selectOption(element, index) {
        // Remove previously selected option styling
        document.querySelectorAll('.option').forEach(opt => {
            opt.classList.remove('selected', 'correct', 'incorrect');
        });
        
        // Mark the selected option
        element.classList.add('selected');
        
        // Get the correct answer for this question
        const correctAnswer = currentQuestions[currentIndex].correctIndex;
        const userAnswer = index;
        
        // Provide immediate feedback
        if (userAnswer === correctAnswer) {
            element.classList.add('correct');
        } else {
            element.classList.add('incorrect');
            // Also highlight the correct answer in green
            document.querySelectorAll('.option').forEach((opt, idx) => {
                if (idx === correctAnswer) {
                    opt.classList.add('correct');
                }
            });
        }
        
        document.getElementById('nextBtn').disabled = false;
    }
    
    function nextQuestion() {
        const selected = document.querySelector('.option.selected input');
        if (!selected) return;
        
        const userAnswer = parseInt(selected.value);
        const correctAnswer = currentQuestions[currentIndex].correctIndex;
        
        if (userAnswer === correctAnswer) {
            score++;
        }
        
        currentIndex++;
        
        if (currentIndex < currentQuestions.length) {
            document.getElementById('nextBtn').disabled = true;
            showQuestion();
        } else {
            showResults();
        }
    }
    
    function updateProgress() {
        const progress = ((currentIndex) / currentQuestions.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = `${currentIndex}/${currentQuestions.length}`;
    }
    
    function showResults() {
        document.getElementById('quizContent').style.display = 'none';
        document.getElementById('resultsContent').classList.add('show');
        
        const percentage = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('scoreDisplay').textContent = percentage + '%';
        document.getElementById('scoreDetails').textContent = `${score} out of ${currentQuestions.length} correct`;
    }
    
    document.getElementById('nextBtn').addEventListener('click', nextQuestion);
    document.getElementById('restartBtn').addEventListener('click', init);
    
    // Initialize on page load
    window.addEventListener('load', init);
</script>
