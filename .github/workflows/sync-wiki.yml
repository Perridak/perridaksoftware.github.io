name: Sync Internal Wiki Submodule
on:
  push:
    branches:
      - main
    paths:
      - 'wiki/**' # Triggers only when the wiki folder content changes

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for Organization-owned repos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true # Pulls existing submodule state
          fetch-depth: 0   # Ensures full history for merging

      - name: Update Submodule Pointer
        run: |
          git config user.name "Perridak Bot"
          git config user.email "bot@perridak.software"
          
          # Update the submodule to the latest commit of its tracked branch
          git submodule update --remote --init wiki
          
          # Check for changes to avoid redundant commits
          if [ -n "$(git status --porcelain)" ]; then
            git add wiki
            git commit -m "chore: auto-sync wiki content [skip ci]" 
            git push
          else
            echo "No changes in submodule pointer detected."
          fi
