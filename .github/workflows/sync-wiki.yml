name: Sync Wiki to Docs

on:
  gollum:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone wiki repository
        run: |
          git clone https://github.com/${{ github.repository }}.wiki.git wiki-temp

      - name: Copy wiki files to /wiki
        run: |
          rm -rf wiki
          mkdir -p wiki
          cp -r wiki-temp/*.md wiki/ || true
          rm -rf wiki-temp

      - name: Auto-inject Jekyll front matter
        run: |
          for file in wiki/*.md; do
            if [ -f "$file" ]; then
              # Check if file already has front matter (starts with ---)
              if ! head -1 "$file" | grep -q "^---"; then
                # Extract filename without extension for title and permalink
                filename=$(basename "$file" .md)
                title=$(echo "$filename" | sed 's/-/ /g')
                
                # Handle Home.md special case
                if [ "$filename" = "Home" ]; then
                  permalink="/wiki/"
                else
                  permalink="/wiki/$(echo "$filename" | tr '[:upper:]' '[:lower:]')/"
                fi
                
                # Create temp file with front matter
                {
                  echo "---"
                  echo "layout: wiki"
                  echo "title: $title"
                  echo "permalink: $permalink"
                  echo "---"
                  echo ""
                  cat "$file"
                } > "$file.tmp" && mv "$file.tmp" "$file"
              fi
            fi
          done

      - name: Debug - List wiki files
        run: |
          echo "=== Contents of wiki/ directory ==="
          ls -la wiki/ || echo "wiki/ directory not found"
          echo "=== First file sample ==="
          head -20 wiki/*.md 2>/dev/null | head -30 || echo "No files to display"

      - name: Commit and push changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "Wiki Sync Bot"
          git add wiki/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: sync wiki" && git push)
