on:
  repository_dispatch:
    types: [wiki_updated]
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - run: |
          git config user.name "Perridak Bot"
          git config user.email "bot@perridak.software"
          git submodule update --remote --init wiki
          if [ -n "$(git status --porcelain)" ]; then
            git add wiki
            git commit -m "chore: auto-sync wiki content [skip ci]"
            git push
          fi
